name: Release Automation

# Automated release pipeline triggered by version tags
# Creates GitHub releases with built artifacts and JavaDoc
# Runs full test suite before release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: false
        gradle-version: wrapper

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compile main sources
      run: ./gradlew classes --console=plain

    - name: Compile test sources
      run: ./gradlew testClasses --console=plain

    - name: Run Checkstyle
      run: ./gradlew checkstyleMain checkstyleTest --console=plain

    - name: Run PMD
      run: ./gradlew pmdMain pmdTest --console=plain

    - name: Run unit tests
      run: ./gradlew test --console=plain

    - name: Run integration tests
      run: ./gradlew integrationTest --console=plain
      env:
        DOCKER_BUILDKIT: 1

    - name: Build JAR
      run: ./gradlew jar --console=plain

    - name: Generate JavaDoc
      run: ./gradlew javadoc --console=plain

    - name: Create release archive
      run: |
        mkdir -p release
        cp -r lib/build/libs/*.jar release/
        cp -r lib/build/docs/javadoc release/
        cp README.md LICENSE release/
        tar -czf dbus-client-java-${GITHUB_REF#refs/tags/}.tar.gz -C release .

    - name: Extract release notes
      id: extract_notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}

        if [ -f CHANGELOG.md ]; then
          # Extract section for this version from CHANGELOG.md
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md > release_notes.txt
        fi

        # If no changelog entry or file, generate basic release notes
        if [ ! -s release_notes.txt ]; then
          echo "## Release ${GITHUB_REF#refs/tags/}" > release_notes.txt
          echo "" >> release_notes.txt
          echo "### Changes" >> release_notes.txt
          echo "" >> release_notes.txt

          # Get previous tag if it exists
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            git log --oneline "${PREV_TAG}..HEAD" >> release_notes.txt
          else
            # First release - show all commits
            git log --oneline >> release_notes.txt
          fi
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dbus-client-java-*.tar.gz
        body_path: release_notes.txt
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
