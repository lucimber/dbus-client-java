name: Generate and Deploy Documentation

on:
  # Trigger after CI completes (for coverage artifacts)
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
    branches: [ main ]
  # Direct trigger for tags (CI also runs on tags)
  push:
    tags: [ 'v*' ]
  # PR trigger for javadoc validation only (no coverage, no deploy)
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  javadoc:
    if: |
      github.repository == 'lucimber/dbus-client-java' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # For workflow_run, checkout the commit that triggered CI
        ref: ${{ github.event.workflow_run.head_sha || github.ref }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compile sources
      run: ./gradlew classes --console=plain

    - name: Generate Javadoc
      run: ./gradlew javadoc --console=plain

    # Download coverage from CI (skip for PRs - they don't need coverage)
    - name: Download coverage from CI
      if: github.event_name != 'pull_request'
      uses: actions/download-artifact@v4
      with:
        name: coverage-reports
        path: lib/build/reports/jacoco/test/
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id || github.run_id }}
      continue-on-error: true

    # For tags triggered directly, we need to wait for CI and get its artifacts
    - name: Wait for CI and download coverage (tag push)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: actions/github-script@v7
      with:
        script: |
          // Find the CI workflow run for this commit
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'ci.yml',
            head_sha: context.sha,
            status: 'completed',
            per_page: 1
          });

          if (runs.data.workflow_runs.length === 0) {
            console.log('No completed CI run found, coverage will be skipped');
            return;
          }

          const runId = runs.data.workflow_runs[0].id;
          console.log(`Found CI run: ${runId}`);

          // Download artifacts
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: runId
          });

          const coverageArtifact = artifacts.data.artifacts.find(a => a.name === 'coverage-reports');
          if (coverageArtifact) {
            console.log(`Found coverage artifact: ${coverageArtifact.id}`);
            core.setOutput('artifact_id', coverageArtifact.id);
            core.setOutput('run_id', runId);
          }

    - name: Move coverage files to expected location
      if: github.event_name != 'pull_request'
      run: |
        # The download puts html/ and xml in the target path
        # Move them to the expected structure
        mkdir -p lib/build/reports/jacoco/test/html
        if [ -d "lib/build/reports/jacoco/test/html" ] && [ -f "lib/build/reports/jacoco/test/jacocoTestReport.xml" ]; then
          echo "Coverage reports found"
          ls -la lib/build/reports/jacoco/test/
        else
          echo "Coverage reports not found, will skip coverage in docs"
        fi

    - name: Extract coverage percentage
      id: coverage
      if: github.event_name != 'pull_request'
      run: |
        XML_FILE="lib/build/reports/jacoco/test/jacocoTestReport.xml"

        if [ ! -f "$XML_FILE" ]; then
          echo "No coverage XML found, using 0%"
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"N/A\", \"color\": \"lightgrey\"}" > coverage-badge.json
          echo "COVERAGE_AVAILABLE=false" >> $GITHUB_ENV
          exit 0
        fi

        echo "COVERAGE_AVAILABLE=true" >> $GITHUB_ENV

        COVERAGE_DATA=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('$XML_FILE')
        root = tree.getroot()
        counters = root.findall('.//counter[@type=\"INSTRUCTION\"]')
        if counters:
            last = counters[-1]
            print(f\"{last.get('missed', '0')} {last.get('covered', '0')}\")
        else:
            print('0 0')
        " 2>/dev/null || echo "0 0")

        MISSED=$(echo "$COVERAGE_DATA" | cut -d' ' -f1)
        COVERED=$(echo "$COVERAGE_DATA" | cut -d' ' -f2)

        if [ "$COVERED" != "0" ] || [ "$MISSED" != "0" ]; then
          TOTAL=$((COVERED + MISSED))
          PERCENTAGE=$((COVERED * 100 / TOTAL))
        else
          PERCENTAGE=0
        fi

        echo "COVERAGE_PERCENTAGE=$PERCENTAGE" >> $GITHUB_ENV
        echo "Coverage: $PERCENTAGE%"

        if [ $PERCENTAGE -ge 80 ]; then
          COLOR="brightgreen"
        elif [ $PERCENTAGE -ge 60 ]; then
          COLOR="yellow"
        elif [ $PERCENTAGE -ge 40 ]; then
          COLOR="orange"
        else
          COLOR="red"
        fi

        echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$PERCENTAGE%\", \"color\": \"$COLOR\"}" > coverage-badge.json

    - name: Determine version and prepare content
      if: github.event_name != 'pull_request'
      run: |
        # Determine version from ref
        if [[ "${{ github.event.workflow_run.head_branch || github.ref }}" == refs/tags/* ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "IS_RELEASE=true" >> $GITHUB_ENV
        else
          VERSION="latest"
          echo "IS_RELEASE=false" >> $GITHUB_ENV
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV

        # Create version-specific directories
        mkdir -p _site/$VERSION
        cp -r lib/build/docs/javadoc/* _site/$VERSION/

        # Add coverage if available
        if [ "$COVERAGE_AVAILABLE" = "true" ] && [ -d "lib/build/reports/jacoco/test/html" ]; then
          mkdir -p _site/$VERSION/coverage
          cp -r lib/build/reports/jacoco/test/html/* _site/$VERSION/coverage/
        fi

        # Copy coverage badge JSON
        if [ -f "coverage-badge.json" ]; then
          cp coverage-badge.json _site/
        fi

        # For releases, also update 'latest'
        if [[ "$IS_RELEASE" == "true" ]]; then
          mkdir -p _site/latest
          cp -r lib/build/docs/javadoc/* _site/latest/
          if [ "$COVERAGE_AVAILABLE" = "true" ] && [ -d "lib/build/reports/jacoco/test/html" ]; then
            mkdir -p _site/latest/coverage
            cp -r lib/build/reports/jacoco/test/html/* _site/latest/coverage/
          fi
        fi

    - name: Download existing site (for version history)
      if: github.event_name != 'pull_request'
      continue-on-error: true
      run: |
        git fetch origin gh-pages:gh-pages 2>/dev/null || true

        if git rev-parse --verify gh-pages >/dev/null 2>&1; then
          echo "Found existing gh-pages branch, extracting version history..."
          mkdir -p existing_site
          git archive gh-pages | tar -x -C existing_site

          for dir in existing_site/v*/; do
            if [ -d "$dir" ]; then
              version_name=$(basename "$dir")
              if [ ! -d "_site/$version_name" ]; then
                echo "Preserving existing version: $version_name"
                cp -r "$dir" "_site/$version_name"
              fi
            fi
          done

          if [ -f "existing_site/versions.json" ] && [ ! -f "_site/versions.json" ]; then
            cp existing_site/versions.json _site/
          fi
        else
          echo "No existing gh-pages branch found, starting fresh"
        fi

    - name: Generate version index and main page
      if: github.event_name != 'pull_request'
      run: |
        cd _site

        VERSIONS=$(find . -maxdepth 1 -type d \( -name 'v*' -o -name 'latest' \) | sed 's|./||' | sort -V -r)

        echo '{"versions": [' > versions.json
        first=true
        for version in $VERSIONS; do
          if [ "$first" = true ]; then
            first=false
          else
            echo ',' >> versions.json
          fi
          if [ "$version" = "latest" ]; then
            echo "  {\"name\": \"latest\", \"url\": \"./latest/\", \"title\": \"Latest (Development)\", \"javadoc\": \"./latest/\", \"coverage\": \"./latest/coverage/\"}" >> versions.json
          else
            echo "  {\"name\": \"$version\", \"url\": \"./$version/\", \"title\": \"Version $version\", \"javadoc\": \"./$version/\", \"coverage\": \"./$version/coverage/\"}" >> versions.json
          fi
        done
        echo ']}' >> versions.json

        cp ../scripts/docs-website/index-template.html index.html
        cp ../scripts/docs-website/version-switcher.js version-switcher.js

        for version_dir in */; do
          if [ -d "$version_dir" ]; then
            find "$version_dir" -name "*.html" -type f -exec sed -i 's|</body>|<script src="/version-switcher.js"></script></body>|g' {} \;
          fi
        done

    - name: Setup Pages
      if: github.event_name != 'pull_request'
      uses: actions/configure-pages@v4

    - name: Upload artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

  deploy:
    needs: javadoc
    if: |
      github.repository == 'lucimber/dbus-client-java' &&
      github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
